<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro de Aluno com Bootstrap </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body class="bg-body text-black">

    <main class="mt-5">
    
        <div class="d-flex justify-content-center align-items-center">
           <div class="col-12 col-md-10 col-lg-8">
        
        <div class="card-body">
        <div class="card shadow p-4">

                    <form id="form-login" class=" row g-3">
                        <h2 id="titulo" class="text-center mb-3">Cadastro Aluno</h2>

                        <p class="text-center mb-3"> Preencha os dados abaixos para realizar o registro completo do
                            aluno no sistema acadêmico</p>

                            <div class="col-md-6">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="nome">
                        </div>

                        <div class="col-md-6">
                            <label for="cpf" class="form-label">CPF</label>
                            <input type="text" class="form-control" id="cpf">
                        </div>

                        <div class="col-md-4">
                            <label for="dataNascimento" class="form-label">Data de Nascimento</label>
                            <input type="number" class="form-control" id="dataNascimento" placeholder="mm/dd/yyyy">
                        </div>
                        
                        <div class="col-md-4">
                            <label for="telefone" class="form-label">Telefone</label>
                            <input type="tel" class="form-control" id="telefone">
                        </div>
                         <div class="col-md-4">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email">
                        </div>


                    
                        <div class="col-md-10">
                            <label for="inputAddress" class="form-label">Endereço Completo</label>
                            <input type="text" class="form-control" id="inputAddress">
                    </div>
                    <div class=" col-md-3">
                            <label for="inputAddress2" class="form-label">Cidade</label>
                            <input type="text" class="form-control" id="inputCidade">
                        </div>
                        <div class="col-md-3">
                            <label for="inputEstado" class="form-label">Estado</label>
                            <input type="text" class="form-control" id="inputEstado">
                        </div>
                        <div class="col-md-3">
                            <label for="inputCEP" class="form-label">CEP</label>
                            <input type="text" class="form-control" id="inputCEP">
                </div>
                 
                <div class="col-md-4">
                            <label for="curso" class="form-label">Curso</label>
                            <input type="text" class="form-control" id="curso">
                        </div>
                        
                       <div class="col-md-4">
                            <label for="matricula" class="form-label">Matrícula</label>
                            <input type="text" class="form-control" id="matricula">
                        </div>


                <div class="col-md-5">
                            <label for="inputPassword4" class="form-label">Password</label>
                            <input type="password" class="form-control" id="inputPassword4">
                        </div>

                        
                <div class="col-md-5">
                            <label for="confirmarSenha" class="form-label">Confirmar Senha</label>
                            <input type="password" class="form-control" id="confirmarSenha">
                        </div>

                        <div class="card-body">
                 <div class="col-12">
            <button type="submit" class="btn btn-primary w-100">Cadastrar Aluno</button>
        </div>
        </div>
</form>
            </div>
        </div>
        </div>
        </div>
    </div>

    </main>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="scripts/script.js"> </script>

</body>

</html>
